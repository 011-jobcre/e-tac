<label class="text-sm tracking-widest ml-1">小分類</label>
<select name="shobunrui"
        id="id_shobunrui"
        class="select outline-none w-full"
        required
        {% if disabled %}disabled{% endif %}
        x-model="shoSelected"
        @change="updateSummary()">
    <option value="">小分類を選択してください</option>
    {% for sho in shobunrui_list %}
        <option value="{{ sho.code }}">{{ sho.code }} {{ sho.name }}</option>
    {% endfor %}
</select>
