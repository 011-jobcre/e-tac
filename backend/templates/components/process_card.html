{% load static %}
<div class="group relative h-96 rounded-3xl overflow-hidden shadow-lg"
     data-aos="fade-up">
    <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
         width="800"
         height="1200"
         src="{% static 'images/'|add:img %}"
         alt="{{ title }}" />
    <div class="absolute inset-0 bg-linear-to-t from-primary/90 via-primary/20 to-transparent"></div>
    <div class="absolute bottom-0 left-0 p-8 text-white w-full">
        <div class="text-accent text-xs font-bold tracking-[0.3em] uppercase mb-2">Step {{ step }}</div>
        <h3 class="text-2xl font-bold mb-2">{{ title }}</h3>
        <p class="text-sm text-white/70 opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-4 group-hover:translate-y-0 leading-relaxed">
            {{ body }}
        </p>
    </div>
</div>
