{% extends "base.html" %}
{% load static i18n %}
{% block title %}
    {% trans "お問い合わせ" %} | e-tac
{% endblock title %}
{% block content %}
    <!-- Hero -->
    <section class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-primary text-white">
        <div class="absolute inset-0 pointer-events-none opacity-20">
            <img src="{% static 'images/stitch_094c65bc.jpg' %}"
                 alt=""
                 class="w-full h-full object-cover" />
        </div>
        <div class="container-content relative z-10 text-center"
             data-aos="fade-up">
            <h1 class="text-3xl lg:text-5xl font-bold tracking-widest uppercase">{% trans "お問い合わせ" %}</h1>
        </div>
    </section>
    <!-- Main Content -->
    <div class="container-content section-pad space-y-32">
        <section>
            <!-- Form Area -->
            <div class="mb-12" data-aos="fade-up" data-aos-delay="100">
                <h2 class="section-title mb-6 text-center">{% trans "お問い合わせ・ご相談" %}</h2>
            </div>
            <div class="max-w-2xl mx-auto" data-aos="fade-up" data-aos-delay="200">
                <div class="border border-border rounded-2xl p-10 overflow-hidden bg-surface">
                    <form class="space-y-6">
                        {% csrf_token %}
                        <div class="grid lg:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm tracking-widest ml-1">
                                    姓 <span class="text-red-500">*</span>
                                </label>
                                <input type="text"
                                       required
                                       placeholder="{% trans "例：山田" %}"
                                       class="form-input" />
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm tracking-widest ml-1">
                                    名 <span class="text-red-500">*</span>
                                </label>
                                <input type="text"
                                       required
                                       placeholder="{% trans "例：太郎" %}"
                                       class="form-input" />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm tracking-widest ml-1">
                                会社名 <span class="text-red-500">*</span>
                            </label>
                            <input type="text"
                                   required
                                   placeholder="{% trans "例：株式会社イーテック" %}"
                                   class="form-input" />
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm tracking-widest ml-1">
                                メールアドレス <span class="text-red-500">*</span>
                            </label>
                            <input type="email"
                                   required
                                   placeholder="example@e-tac.co.jp"
                                   class="form-input" />
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm tracking-widest ml-1">
                                お問い合わせ内容 <span class="text-red-500">*</span>
                            </label>
                            <textarea rows="6"
                                      required
                                      placeholder="{% trans '具体的な課題やご要望をご記入ください。' %}"
                                      class="form-input resize-none"></textarea>
                        </div>
                        <div class="flex flex-col gap-3">
                            <div class="flex justify-center items-center gap-3">
                                <input type="checkbox"
                                       id="privacy"
                                       required
                                       class="w-4 h-4 rounded border-border text-secondary focus:ring-secondary focus:ring-2" />
                                <label for="privacy" class="text-sm leading-relaxed">
                                    <a href="#" class="font-bold hover:underline">{% trans "プライバシーポリシー" %}</a>{% trans "に同意する" %}
                                </label>
                            </div>
                            <button type="submit"
                                    class="shine-btn w-full max-w-xs mx-auto bg-primary font-bold text-white py-4 rounded-2xl shadow-xl shadow-primary/20 text-lg hover:scale-[1.02] transition-transform">
                                {% trans "送信する" %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
{% endblock content %}
