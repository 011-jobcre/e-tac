{% extends "base.html" %}
{% load static i18n %}
{% block title %}
    {% trans "グループ" %} | e-tac
{% endblock title %}
{% block content %}
    <!-- Hero -->
    <section class="relative pt-32 pb-10 lg:pt-36 lg:pb-14 overflow-hidden">
        <div class="container-content relative z-10 text-center"
             data-aos="fade-up">
            <h1 class="text-3xl lg:text-5xl font-bold tracking-widest uppercase">{% trans "グループ" %}</h1>
        </div>
    </section>
    <!-- Main Content -->
    <div class="container-content section-pad space-y-32">
        <section>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="100">
                    <h3 class="text-2xl font-bold mb-2">Creator Holdings</h3>
                </div>
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="200">
                    <h3 class="text-2xl font-bold mb-2 uppercase">Job Creator</h3>
                </div>
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="300">
                    <h3 class="text-2xl font-bold mb-2">e-tac</h3>
                </div>
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="400">
                    <h3 class="text-2xl font-bold mb-2">Food Creators</h3>
                </div>
            </div>
        </section>
    </div>
{% endblock content %}
