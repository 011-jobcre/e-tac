{% extends "base.html" %}
{% load static i18n %}
{% block title %}
    {% trans "グループ" %} | e-tac
{% endblock title %}
{% block content %}
    <!-- Hero -->
    <section class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-primary text-white">
        <div class="absolute inset-0 pointer-events-none opacity-20">
            <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1920&q=80"
                 alt=""
                 class="w-full h-full object-cover" />
        </div>
        <div class="container-content relative z-10 text-center"
             data-aos="fade-up">
            <h1 class="text-3xl lg:text-5xl font-bold tracking-widest uppercase">{% trans "グループ" %}</h1>
        </div>
    </section>
    <!-- Main Content -->
    <div class="container-content section-pad space-y-32">
        <section>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="100">
                    <h3 class="text-2xl font-bold mb-2">Job Holdings</h3>
                </div>
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="200">
                    <h3 class="text-2xl font-bold mb-2 ">Job Creators</h3>
                </div>
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="300">
                    <h3 class="text-2xl font-bold mb-2">e-tac</h3>
                </div>
                <div class="minimal-card" data-aos="fade-up" data-aos-delay="400">
                    <h3 class="text-2xl font-bold mb-2">Food Creators</h3>
                </div>
            </div>
        </section>
    </div>
{% endblock content %}
