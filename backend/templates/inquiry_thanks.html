{% extends "base.html" %}
{% load static i18n %}
{% block title %}
    {% trans "お問い合わせありがとうございました" %} | e-tac
{% endblock title %}
{% block content %}
    <!-- Hero -->
    <section class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-primary text-white">
        <div class="absolute inset-0 pointer-events-none opacity-20">
            <img src="{% static 'images/stitch_094c65bc.jpg' %}"
                 alt=""
                 class="w-full h-full object-cover" />
        </div>
        <div class="container-content relative z-10 text-center"
             data-aos="fade-up">
            <h1 class="text-3xl lg:text-5xl font-bold tracking-widest uppercase">
                {% trans "お問い合わせありがとうございました" %}
            </h1>
        </div>
    </section>
    <!-- Main Content -->
    <section class="container-content section-pad">
        <div class="max-w-3xl mx-auto text-center space-y-8"
             data-aos="fade-up"
             data-aos-delay="100">
            <div class="space-y-4">
                <p class="text-xl leading-relaxed">{% trans "お問い合わせを受け付けました。" %}</p>
                <p class="leading-relaxed">{% trans "内容を確認の上、担当者よりご連絡いたします。" %}</p>
            </div>
            <a href="{% url 'home' %}" class="shine-btn btn btn-primary btn-wide">{% trans "ホームへ戻る" %}</a>
        </div>
    </section>
{% endblock content %}
