{% load static i18n %}
<nav class="sticky top-0 w-full z-50 border-b-2 border-zinc-100 dark:border-zinc-900 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl">
    <div class="flex justify-between items-center h-24 px-10 max-w-[1440px] mx-auto">
        <div class="flex items-center gap-4">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost md:hidden">
                    <span class="material-symbols-outlined">menu</span>
                </div>
                <ul tabindex="0"
                    class="menu dropdown-content bg-base-100 rounded-box z-[100] min-w-48 p-2 shadow">
                    <li>
                        <a href="{% url 'home' %}">{% trans "ホーム" %}</a>
                    </li>
                    <li>
                        <a href="{% url 'about' %}">{% trans "会社概要" %}</a>
                    </li>
                    <li>
                        <a href="{% url 'services' %}">{% trans "サービス" %}</a>
                    </li>
                    <li>
                        <a href="{% url 'contact' %}">{% trans "お問い合わせ" %}</a>
                    </li>
                </ul>
            </div>
            <a href="{% url 'home' %}"
               class="text-3xl font-black text-blue-600 dark:text-blue-500 tracking-tighter italic font-['Space_Grotesk'] uppercase">
                e-tac
            </a>
        </div>
        <div class="hidden md:flex items-center gap-8">
            <a class="font-['Space_Grotesk'] font-bold uppercase tracking-tighter transition-all duration-300 {% if request.resolver_match.url_name == 'about' %}text-blue-600 dark:text-blue-400 border-b-4 border-blue-600 pb-1{% else %}text-zinc-900 dark:text-zinc-100 hover:text-blue-600{% endif %}"
               href="{% url 'about' %}">{% trans "会社概要" %}</a>
            <a class="font-['Space_Grotesk'] font-bold uppercase tracking-tighter transition-all duration-300 {% if request.resolver_match.url_name == 'services' %}text-blue-600 dark:text-blue-400 border-b-4 border-blue-600 pb-1{% else %}text-zinc-900 dark:text-zinc-100 hover:text-blue-600{% endif %}"
               href="{% url 'services' %}">{% trans "サービス" %}</a>
            <a class="font-['Space_Grotesk'] font-bold uppercase tracking-tighter transition-all duration-300 {% if request.resolver_match.url_name == 'contact' %}text-blue-600 dark:text-blue-400 border-b-4 border-blue-600 pb-1{% else %}text-zinc-900 dark:text-zinc-100 hover:text-blue-600{% endif %}"
               href="{% url 'contact' %}">{% trans "お問い合わせ" %}</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="{% url 'contact' %}"
               class="bg-primary-container text-on-primary px-8 py-3 rounded-full font-label-bold text-label-bold hover:opacity-80 transition-all duration-300 scale-95 active:scale-90 hidden md:block">
                {% trans "資料請求" %}
            </a>
            <form action="{% url 'set_language' %}" method="post" class="inline">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.get_full_path }}" />
                <div class="space-x-0.5 flex">
                    <button type="submit"
                            name="language"
                            value="ja"
                            class="btn btn-sm hover:-translate-y-0.5 transform transition-all duration-200 {% if LANGUAGE_CODE == 'ja' %}btn-primary{% else %}btn-ghost{% endif %}">
                        JP
                    </button>
                    <button type="submit"
                            name="language"
                            value="en"
                            class="btn btn-sm hover:-translate-y-0.5 transform transition-all duration-200 {% if LANGUAGE_CODE == 'en' %}btn-primary{% else %}btn-ghost{% endif %}">
                        EN
                    </button>
                </div>
            </form>
        </div>
    </div>
</nav>
