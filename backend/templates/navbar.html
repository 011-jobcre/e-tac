{% load i18n %}
<header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-sm border-b-2 border-slate-900">
    <div class="flex justify-between items-center h-24 px-10 max-w-[1440px] mx-auto">
        <div class="text-3xl font-black text-blue-700 uppercase tracking-tighter font-['Space_Grotesk']">
            <a href="{% url 'home' %}">e-tac</a>
        </div>
        <nav class="hidden md:flex items-center gap-10">
            <a class="font-['Space_Grotesk'] font-bold tracking-tight {% if request.resolver_match.url_name == 'home' %}text-blue-700 border-b-4 border-blue-700 pb-1{% else %}text-slate-900 hover:text-blue-600{% endif %} active:scale-95 transform transition-all duration-200"
               href="{% url 'home' %}">{% trans "ホーム" %}</a>
            <a class="font-['Space_Grotesk'] font-bold tracking-tight {% if request.resolver_match.url_name == 'about' %}text-blue-700 border-b-4 border-blue-700 pb-1{% else %}text-slate-900 hover:text-blue-600{% endif %} active:scale-95 transform transition-all duration-200"
               href="{% url 'about' %}">{% trans "会社概要" %}</a>
            <a class="font-['Space_Grotesk'] font-bold tracking-tight {% if request.resolver_match.url_name == 'services' %}text-blue-700 border-b-4 border-blue-700 pb-1{% else %}text-slate-900 hover:text-blue-600{% endif %} active:scale-95 transform transition-all duration-200"
               href="{% url 'services' %}">{% trans "サービス" %}</a>
        </nav>
        <div class="flex items-center gap-4">
            <a href="{% url 'contact' %}"
               class="bg-primary text-on-primary px-8 py-3 rounded-full font-label-bold text-label-bold active:scale-95 transform transition-transform">
                {% trans "お問い合わせ" %}
            </a>
            <form action="{% url 'set_language' %}" method="post" class="inline">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.get_full_path }}" />
                <div class="space-x-0.5">
                    <button type="submit"
                            name="language"
                            value="ja"
                            class="btn btn-sm hover:-translate-y-0.5 transform transition-all duration-300 {% if LANGUAGE_CODE == 'ja' %}btn-primary{% else %}btn-neutral{% endif %}">
                        JP
                    </button>
                    <button type="submit"
                            name="language"
                            value="en"
                            class="btn btn-sm hover:-translate-y-0.5 transform transition-all duration-300 {% if LANGUAGE_CODE == 'en' %}btn-primary{% else %}btn-neutral{% endif %}">
                        EN
                    </button>
                </div>
            </form>
        </div>
    </div>
</header>
